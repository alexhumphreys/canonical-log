spring.application.name=canonical-log-spring-demo

spring.datasource.url=jdbc:h2:mem:canonical-log-demo;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always

server.port=8080

spring.threads.virtual.enabled=true

# Second (non-HTTP) entry point: the @Scheduled ReportingJob. Off by default so it
# doesn't add background canonical lines; flip to true to watch job lines appear.
# canonical-log.sample.scheduled-job.enabled=true
# canonical-log.sample.scheduled-job.fixed-delay-ms=5000
